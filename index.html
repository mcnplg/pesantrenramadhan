<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pesantren Ramadhan SD Negeri 75 Palembang</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background: radial-gradient(circle at bottom,#0d1b2a 0%,#000814 70%,#000000 100%);
  color:white;
  overflow:hidden;
}

/* ================= HEADER ================= */

.top-section{
  padding:60px 100px 20px 100px;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:80px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:40px 60px;
  border-radius:40px;
}

.logo{
  height:180px;
}

.header-text{
  text-align:center;
}

.header-text h1{
  font-size:80px;
  font-weight:800;
  color:#ff0037;
  text-shadow:0 0 30px rgba(255,215,0,0.7);
}

.header-text h2{
  font-size:32px;
  font-weight:400;
}

/* ================= BUTTON GRID ================= */

.button-container{
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:50px;
  margin-top:60px;
}

.button-container>div{
  position:relative;
}

.main-btn{
  width:100%;
  padding:60px 20px;
  background:linear-gradient(145deg,#2c7be5,#1a5dc9);
  border:none;
  border-radius:35px;
  color:white;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.main-btn h4{
  font-size:30px;
  font-weight:700;
}

.main-btn p{
  font-size:26px;
  margin-top:10px;
}

.main-btn:hover{
  transform:translateY(-8px);
}

/* Dropdown */

.dropdown{
  position:absolute;
  top:110%;
  left:0;
  right:0;
  display:none;
  flex-direction:column;
  gap:20px;
  background:rgba(0,0,0,0.95);
  padding:30px;
  border-radius:25px;
  z-index:100;
}

.sub-btn{
  padding:25px;
  font-size:24px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* ================= FOTO ================= */

.foto-section{
  flex:1;
  position:relative;
}

.foto-section img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.welcome-text{
  position:absolute;
  top:120px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  padding:40px 80px;
  border-radius:40px;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.3);
}

.welcome-text .line1{
  font-size:80px;
  font-weight:800;
}

.welcome-text .line2{
  font-size:50px;
  margin-top:10px;
}

.welcome-text .line3{
  font-size:28px;
  margin-top:15px;
}

/* ================= CONTROL ================= */

.music-btn,
.fullscreen-btn{
  position:fixed;
  bottom:40px;
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  background:#0088ffaa;
  color:white;
}

.music-btn{ right:40px; }
.fullscreen-btn{ left:40px; }

/* ================= VIDEO ================= */

.video-overlay{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.video-overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.back-btn{
  position:absolute;
  bottom:40px;
  left:40px;
  padding:20px 40px;
  font-size:24px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  background:#0088ff;
  color:white;
}
</style>
</head>

<body>

<div class="top-section">
  <div class="header-content">
    <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokiri.png" class="logo">
    <div class="header-text">
      <h1>SD NEGERI 75 PALEMBANG</h1>
      <h2><i>"SEKOLAH TEPAT UNTUK ANAK HEBAT"</i></h2>
    </div>
    <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokanan.png" class="logo">
  </div>

  <div class="button-container">

    <!-- 7 Tombol -->
    <script>
      const days=[
        ["Kamis, 5 Maret 2026","Pembukaan"],
        ["Jumat, 6 Maret 2026","Lomba Azan"],
        ["Sabtu, 7 Maret 2026","Lomba Menyanyi Islami"],
        ["Senin, 9 Maret 2026","Lomba Puisi Islami"],
        ["Selasa, 10 Maret 2026","Lomba Dai Cilik"],
        ["Rabu, 11 Maret 2026","Lomba Mewarnai"],
        ["Kamis, 12 Maret 2026","Nuzulul Qur'an"]
      ];

      document.write(days.map((d,i)=>`
      <div>
        <button class="main-btn" onclick="toggleDropdown(${i})">
          <h4>${d[0]}</h4>
          <p>${d[1]}</p>
        </button>
        <div class="dropdown" id="dropdown${i}">
          <button class="sub-btn">Video</button>
          <button class="sub-btn">Quiz</button>
        </div>
      </div>
      `).join(""));
    </script>

  </div>
</div>

<div class="foto-section">
  <div class="welcome-text">
    <div class="line1">SELAMAT DATANG</div>
    <div class="line2">PESERTA PESANTREN RAMADHAN 1447 H</div>
    <div class="line3">5 - 12 MARET 2026</div>
  </div>
  <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/fotobg.png">
</div>

<button class="music-btn">🔊 Musik</button>
<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Fullscreen</button>

<div class="video-overlay" id="videoOverlay">
  <video controls></video>
  <button class="back-btn" onclick="closeVideo()">⬅ Kembali</button>
</div>

<script>
function toggleDropdown(num){
  const dd=document.getElementById("dropdown"+num);
  document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");
  dd.style.display="flex";
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
