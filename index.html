<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesantren Ramadhan SD Negeri 75 Palembang</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: radial-gradient(
    ellipse at bottom,
    #0d1b2a 0%,
    #000814 60%,
    #000000 100%
  );
  color: white;
  overflow: hidden;
}

/* ================= TOP SECTION ================= */

.top-section {
  width: 100%;
  max-width: 1800px;   /* penting untuk 4K */
  margin: 0 auto;
  padding: 60px 60px 0 60px;
  position: relative;
  z-index: 3;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 60px;
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(20px);
  padding: 30px 40px;
  border-radius: 25px;
}

.logo {
  max-height: 160px; /* diperbesar */
  object-fit: contain;
}

.header h1 {
  font-size: clamp(40px, 3vw, 70px);
  color: #ff0037;
  text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
}

.header h2 {
  font-size: clamp(20px, 1.5vw, 32px);
  font-weight: 400;
  margin-top: 10px;
}

/* ================= DASHBOARD ================= */

.button-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap; /* penting untuk layar sentuh */
  gap: 25px;
  margin-top: 30px;
}

.button-container > div {
  position: relative;
}

.main-btn {
  width: 240px;      /* tombol lebih besar */
  height: 110px;
  background: #2c7be5;
  color: white;
  border: none;
  border-radius: 18px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  padding: 15px;
}

.main-btn h4 {
  font-size: 20px;
}

.main-btn p {
  font-size: 18px;
  margin-top: 8px;
}

.main-btn:hover {
  background: #1a5dc9;
  transform: translateY(-8px);
}

/* Dropdown */
.dropdown {
  position: absolute;
  top: 115%;
  left: 0;
  display: none;
  flex-direction: column;
  gap: 12px;
  background: rgba(0, 0, 0, 0.9);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  z-index: 10;
}

.sub-btn {
  padding: 14px 20px;
  font-size: 18px;
  background: #ffffff;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* ================= FOTO SECTION ================= */

.foto-section {
  position: relative;
  flex: 1;
  width: 100%;
  overflow: hidden;
}

.foto-section img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ================= WELCOME TEXT ================= */

.welcome-text {
  position: absolute;
  top: 90px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  padding: 20px 40px;
  backdrop-filter: blur(6px);
}

.welcome-text .line1 {
  font-size: clamp(50px, 4vw, 90px);
  font-weight: 800;
}

.welcome-text .line2 {
  font-size: clamp(32px, 2.5vw, 60px);
  font-weight: 700;
  margin-top: 10px;
}

.welcome-text .line3 {
  font-size: clamp(22px, 1.5vw, 32px);
  margin-top: 10px;
}

/* ================= BUTTON FIXED ================= */

.music-btn,
.fullscreen-btn {
  position: fixed;
  bottom: 30px;
  padding: 16px 30px;
  border-radius: 40px;
  font-size: 18px;
  cursor: pointer;
  font-weight: 600;
  border: none;
  z-index: 5;
}

.music-btn {
  right: 40px;
}

.fullscreen-btn {
  left: 40px;
}
    </style>
  </head>

  <body>
    <div class="top-section">
      <div class="header">
        <div class="header-content">
          <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokiri.png" alt="Logo Kiri" class="logo" />

          <div class="header-text">
            <h1>SD NEGERI 75 PALEMBANG</h1>
            <h2><i>"SEKOLAH TEPAT UNTUK ANAK HEBAT"</i></h2>
          </div>

          <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokanan.png" alt="Logo Kanan" class="logo" />
        </div>
      </div>

      <div class="button-container">
        <!-- Buat 7 tombol -->
        <div>
          <button class="main-btn" onclick="toggleDropdown(1)">
            <h4>Kamis, 5 Maret 2026</h4>
            <p>Pembukaan</p>
          </button>
          <div class="dropdown" id="dropdown1">
            <button class="sub-btn" onclick="openVideo('video1.mp4')">
              Film <i>"Children of Heaven"</i>
            </button>
            <button class="sub-btn">Quiz</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(2)">
            <h4>Jumat, 6 Maret 2026</h4>
            <p>Lomba Azan</p>
          </button>
          <div class="dropdown" id="dropdown2">
            <button class="sub-btn">Sub 2A</button>
            <button class="sub-btn">Sub 2B</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(3)">
            <h4>Sabtu, 7 Maret 2026</h4>
            <p>Lomba Menyanyi Islami</p>
          </button>
          <div class="dropdown" id="dropdown3">
            <button class="sub-btn">Sub 3A</button>
            <button class="sub-btn">Sub 3B</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(4)">
            <h4>Senin, 9 Maret 2026</h4>
            <p>Lomba Puisi Islami</p>
          </button>
          <div class="dropdown" id="dropdown4">
            <button class="sub-btn">Sub 4A</button>
            <button class="sub-btn">Sub 4B</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(5)">
            <h4>Selasa, 10 Maret 2026</h4>
            <p>Lomba Dai Cilik</p>
          </button>
          <div class="dropdown" id="dropdown5">
            <button class="sub-btn">Sub 5A</button>
            <button class="sub-btn">Sub 5B</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(6)">
            <h4>Rabu, 11 Maret 2026</h4>
            <p>Lomba Mewarnai</p>
          </button>
          <div class="dropdown" id="dropdown6">
            <button class="sub-btn">Sub 6A</button>
            <button class="sub-btn">Sub 6B</button>
          </div>
        </div>

        <div>
          <button class="main-btn" onclick="toggleDropdown(7)">
            <h4>Kamis, 12 Maret 2026</h4>
            <p>Peringatan Nuzulul Qur'an</p>
          </button>
          <div class="dropdown" id="dropdown7">
            <button class="sub-btn">Sub 7A</button>
            <button class="sub-btn">Sub 7B</button>
          </div>
        </div>
      </div>
    </div>

    <div class="foto-section">
      <div class="welcome-text">
        <div class="line1">SELAMAT DATANG</div>
        <div class="line2">PESERTA PESANTREN RAMADHAN 1447 H</div>
        <div class="line3">
          <i>“Membentuk Generasi Cerdas dan Berakhlak Al-Qur’an”</i>
        </div>
        <div class="line3"><i>5 - 12 MARET 2026</i></div>
      </div>
      <img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/fotobg.png" alt="Background" />
    </div>

    <audio autoplay loop>
      <source src="https://mcnplg.github.io/pesantrenramadhan/assets/audio/ramadhan.mp3" type="audio/mp3" />
    </audio>

    <button
      class="music-btn"
      onclick="
        document.querySelector('audio').paused
          ? document.querySelector('audio').play()
          : document.querySelector('audio').pause()
      "
    >
      🔊 Musik
    </button>

    <button
      class="fullscreen-btn"
      onclick="toggleFullscreen()"
      id="fullscreenBtn"
    >
      ⛶ Fullscreen
    </button>

    <script>
      for (let i = 0; i < 40; i++) {
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = Math.random() * 3 + 1 + "s";
        document.body.appendChild(star);
      }

      for (let i = 0; i < 10; i++) {
        let moon = document.createElement("div");
        moon.className = "crescent";
        moon.innerHTML = "☾";
        moon.style.left = Math.random() * 100 + "%";
        moon.style.animationDuration = Math.random() * 10 + 10 + "s";
        document.body.appendChild(moon);
      }

      function toggleFullscreen() {
        const btn = document.getElementById("fullscreenBtn");
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
          btn.innerHTML = "❎ Exit";
        } else {
          document.exitFullscreen();
          btn.innerHTML = "⛶ Fullscreen";
        }
      }

      function toggleDropdown(num) {
        let selected = document.getElementById("dropdown" + num);

        // Jika sedang terbuka → tutup
        if (selected.style.display === "flex") {
          selected.style.display = "none";
        } else {
          // Tutup semua dulu
          for (let i = 1; i <= 7; i++) {
            document.getElementById("dropdown" + i).style.display = "none";
          }

          // Buka yang dipilih
          selected.style.display = "flex";
        }
      }

      function openVideo(videoSrc) {
        const overlay = document.getElementById("videoOverlay");
        const video = document.getElementById("mainVideo");

        video.src = videoSrc;
        overlay.style.display = "flex";

        video.play();
      }

      function closeVideo() {
        const overlay = document.getElementById("videoOverlay");
        const video = document.getElementById("mainVideo");

        video.pause();
        video.currentTime = 0;
        overlay.style.display = "none";
      }
    </script>

    <!-- ================= VIDEO OVERLAY ================= -->
    <div class="video-overlay" id="videoOverlay">
      <video id="mainVideo" controls>
        <source src="https://mcnplg.github.io/pesantrenramadhan/assets/video/video1.mp4" type="video/mp4" />
        Browser tidak mendukung video.
      </video>

      <button class="back-btn" onclick="closeVideo()">
        ⬅ Kembali ke Halaman Utama
      </button>

    </div>
  </body>
</html>
