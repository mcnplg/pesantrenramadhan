<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pesantren Ramadhan SD Mentari</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background: radial-gradient(ellipse at bottom,#0d1b2a 0%,#000814 60%,#000000 100%);
  color:white;
  overflow-x:hidden;
  position:relative;
}

/* ================= HEADER ================= */

.top-section{
  padding:40px;
  position:relative;
  z-index:3;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:40px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  padding:25px;
  border-radius:25px;
  max-width:1600px;
  margin:auto;
}

.logo{
  max-height:140px;
  object-fit:contain;
}

.header-text{
  text-align:center;
}

.header h1{
  font-size:clamp(32px,4vw,64px);
  color:#ff0037;
  text-shadow:0 0 20px rgba(255,215,0,0.6);
}

.header h2{
  font-weight:400;
}

/* ================= BUTTONS ================= */

.button-container{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:25px;
  margin-top:30px;
}

.button-container>div{
  position:relative;
}

.main-btn{
  padding:25px 40px;
  background:#2c7be5;
  color:white;
  border:none;
  border-radius:16px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
  min-width:240px;
}

.main-btn h4{
  font-size:20px;
}

.main-btn p{
  font-size:18px;
}

.main-btn:hover{
  background:#1a5dc9;
  transform:translateY(-4px);
}

/* Dropdown */

.dropdown{
  position:absolute;
  top:110%;
  left:0;
  display:none;
  flex-direction:column;
  gap:12px;
  background:rgba(0,0,0,0.9);
  padding:18px;
  border-radius:14px;
  z-index:100;
}

.sub-btn{
  padding:16px 25px;
  font-size:18px;
  background:#ffffff;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

/* ================= FOTO ================= */

.foto-section{
  position:relative;
  flex:1;
  min-height:450px;
  overflow:hidden;
}

.foto-section img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.welcome-text{
  position:absolute;
  top:90px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  padding:20px 50px;
  border-radius:25px;
  backdrop-filter:blur(5px);
  text-shadow:0 0 15px rgba(0,0,0,0.8);
}

.welcome-text .line1{
  font-size:clamp(36px,4vw,60px);
  font-weight:800;
}

.welcome-text .line2{
  font-size:clamp(28px,3vw,42px);
  font-weight:700;
}

.welcome-text .line3{
  font-size:clamp(18px,2vw,26px);
}

/* ================= BINTANG ================= */

.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:blink 2s infinite alternate;
}

@keyframes blink{
  from{opacity:0.3;}
  to{opacity:1;}
}

/* ================= CONTROL BUTTON ================= */

.music-btn,
.fullscreen-btn{
  position:fixed;
  bottom:25px;
  padding:15px 25px;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  border:none;
  transition:0.3s;
  z-index:5;
  font-size:18px;
}

.music-btn{
  right:25px;
  background:#0088ff8d;
  color:#fff;
}

.fullscreen-btn{
  left:25px;
  background:#0088ff8d;
  color:#fff;
}

/* ================= VIDEO OVERLAY ================= */

.video-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.video-overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.back-btn{
  position:absolute;
  bottom:25px;
  left:25px;
  padding:15px 30px;
  background:rgba(0,136,255,0.8);
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="top-section">
<div class="header">
<div class="header-content">
<img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokiri.png" class="logo">
<div class="header-text">
<h1>SD NEGERI 75 PALEMBANG</h1>
<h2><i>"SEKOLAH TEPAT UNTUK ANAK HEBAT"</i></h2>
</div>
<img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/logokanan.png" class="logo">
</div>
</div>

<div class="button-container">

<div>
<button class="main-btn" onclick="toggleDropdown(1)">
<h4>Kamis, 5 Maret 2026</h4>
<p>Pembukaan</p>
</button>
<div class="dropdown" id="dropdown1">
<button class="sub-btn" onclick="openVideo('https://mcnplg.github.io/pesantrenramadhan/assets/video/video1.mp4')">
Film "Children of Heaven"
</button>
<button class="sub-btn">Quiz</button>
</div>
</div>

</div>
</div>

<div class="foto-section">
<div class="welcome-text">
<div class="line1">SELAMAT DATANG</div>
<div class="line2">PESERTA PESANTREN RAMADHAN 1447 H</div>
<div class="line3"><i>“Membentuk Generasi Cerdas dan Berakhlak Al-Qur’an”</i></div>
<div class="line3"><i>5 - 12 MARET 2026</i></div>
</div>
<img src="https://mcnplg.github.io/pesantrenramadhan/assets/img/fotobg.png">
</div>

<audio autoplay loop>
<source src="https://mcnplg.github.io/pesantrenramadhan/assets/audio/ramadhan.mp3" type="audio/mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊 Musik</button>
<button class="fullscreen-btn" onclick="toggleFullscreen()" id="fullscreenBtn">⛶ Fullscreen</button>

<div class="video-overlay" id="videoOverlay">
<video id="mainVideo" controls></video>
<button class="back-btn" onclick="closeVideo()">⬅ Kembali</button>
</div>

<script>
for(let i=0;i<40;i++){
let star=document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"%";
star.style.left=Math.random()*100+"%";
star.style.animationDuration=Math.random()*3+1+"s";
document.body.appendChild(star);
}

function toggleDropdown(num){
let selected=document.getElementById("dropdown"+num);
if(selected.style.display==="flex"){
selected.style.display="none";
}else{
document.querySelectorAll(".dropdown").forEach(d=>d.style.display="none");
selected.style.display="flex";
}
}

function toggleFullscreen(){
const btn=document.getElementById("fullscreenBtn");
if(!document.fullscreenElement){
document.documentElement.requestFullscreen();
btn.innerHTML="❎ Exit";
}else{
document.exitFullscreen();
btn.innerHTML="⛶ Fullscreen";
}
}

function toggleMusic(){
let audio=document.querySelector("audio");
audio.paused?audio.play():audio.pause();
}

function openVideo(src){
const overlay=document.getElementById("videoOverlay");
const video=document.getElementById("mainVideo");
video.src=src;
overlay.style.display="flex";
video.play();
}

function closeVideo(){
const overlay=document.getElementById("videoOverlay");
const video=document.getElementById("mainVideo");
video.pause();
video.currentTime=0;
overlay.style.display="none";
}
</script>

</body>
</html>
